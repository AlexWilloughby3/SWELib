name: Weekly Bridge Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit-bridge:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Audit bridge axioms
      run: |
        bash scripts/audit-bridge.sh
      continue-on-error: true

    - name: Report results
      run: |
        echo "Bridge axiom audit completed"
        echo "Check the logs above for any issues"
